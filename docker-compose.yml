services:
  api:
    build: .
    container_name: store-intelligence-api
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data
      - ./configs:/app/configs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
